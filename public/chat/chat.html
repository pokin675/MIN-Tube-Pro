<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="referrer" content="no-referrer" />
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
<title>min-chat</title>
<link rel="preconnect" href__="https://fonts.googleapis.com">
<link rel="preconnect" href__="https://fonts.gstatic.com" crossorigin>
<link href__="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;--bg2:#0f0f0f;--bg3:#141414;
    --line:#242424;--line2:#1a1a1a;
    --fg:#f5f5f5;--muted:#8a8a8a;--subtle:#5e5e5e;
    --gold:#d4af37;--gold2:#a88a2a;--red:#e53935;--ok:#22c55e;--warn:#f59e0b;
    --input:#101010;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:"Noto Sans JP",Inter,"Helvetica Neue",Arial,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  body{background:
    radial-gradient(1200px 600px at 90% -10%, rgba(212,175,55,.07), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(255,255,255,.04), transparent 60%),
    var(--bg)}
  button{font-family:inherit}
  code{font-family:"JetBrains Mono",Consolas,monospace;font-size:12px;background:#000;padding:1px 6px;border:1px solid var(--line);border-radius:4px;color:var(--gold)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#1f1f1f;border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#2a2a2a}
  ::-webkit-scrollbar-track{background:transparent}

  #app{display:none;height:100dvh;flex-direction:column}
  #app.on{display:flex}

  /* topbar */
  #topbar{height:64px;display:flex;align-items:center;gap:14px;padding:0 24px;border-bottom:1px solid var(--line);background:rgba(10,10,10,.85);backdrop-filter:blur(14px);position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1a1a1a,#000);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:900;font-size:18px;box-shadow:0 0 18px rgba(212,175,55,.18), inset 0 0 12px rgba(212,175,55,.05);font-family:Inter,sans-serif}
  .brand .ti{font-size:18px;font-weight:900;letter-spacing:3px;font-family:Inter,sans-serif}
  .brand .sub{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
  .sp{flex:1}
  .rt{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:#000}
  .rt .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok)}
  .rt .dot.ng{background:var(--red);box-shadow:0 0 10px var(--red);animation:bp 1s infinite}
  @keyframes bp{50%{opacity:.3}}
  .iconbtn{background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;padding:8px 12px;border-radius:10px;font-size:13px;transition:all .15s}
  .iconbtn:hover{color:#fff;border-color:#3a3a3a;background:#141414}

  #mechip{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 5px;border:1px solid var(--line);border-radius:999px;background:#000}
  #mechip .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#222,#000);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--gold);font-size:13px;border:1px solid var(--line)}
  #mechip .info{display:flex;flex-direction:column;line-height:1.2;min-width:0;max-width:160px}
  #mechip .info .nm{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #mechip .info .sub{font-size:10px;color:var(--muted);letter-spacing:.5px}
  #mechip button{background:transparent;border:0;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px}
  #mechip button:hover{color:var(--red)}

  /* main */
  #content{flex:1;display:flex;min-height:0;max-width:1500px;width:100%;margin:0 auto}
  #chatpane{flex:1;display:flex;flex-direction:column;min-width:0}
  #chat{flex:1;overflow-y:auto;padding:24px 0 4px;scroll-behavior:smooth}

  /* member list */
  #userpane{width:280px;overflow:auto;padding:24px 14px;border-left:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.012),transparent 30%)}
  .upane-h{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;padding:6px 12px 14px;letter-spacing:2.5px;display:flex;justify-content:space-between;align-items:center}
  .upane-h .cnt{color:var(--gold);font-family:"JetBrains Mono",monospace;letter-spacing:0;font-size:11px}
  .u{padding:8px 10px;border-radius:10px;display:flex;align-items:center;gap:10px;cursor:default;transition:background .15s}
  .u:hover{background:#141414}
  .u .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1f1f1f,#0a0a0a);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px;flex:none;position:relative;border:1px solid var(--line)}
  .u .av::after{content:"";position:absolute;right:-1px;bottom:-1px;width:10px;height:10px;border-radius:50%;background:var(--ok);border:2px solid var(--bg)}
  .u .nm{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

  /* badges (Japanese) */
  .badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:800;letter-spacing:1.5px;display:inline-flex;align-items:center;line-height:1.5;border:1px solid transparent;font-family:"Noto Sans JP",sans-serif}
  .b-founder{background:linear-gradient(135deg,#3a2d05,#1a1304);color:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(212,175,55,.3)}
  .b-admin{background:#1c1c1c;color:#f5f5f5;border-color:#7a7a7a}
  .b-deleter{background:#1c1c1c;color:#9ca3af;border-color:#374151}
  .tag{color:var(--subtle);font-size:11px;font-weight:500;font-family:"JetBrains Mono",Consolas,monospace}

  .rainbow{background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcf7f,#4d96ff,#9b59f6,#ff6b6b);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:rb 4s linear infinite;font-weight:800}
  @keyframes rb{to{background-position:200% center}}

  /* messages */
  .msg{padding:2px 24px 2px 78px;position:relative;min-height:22px}
  .msg.first{margin-top:18px;padding-top:8px;padding-bottom:8px;min-height:48px}
  .msg.first .av{position:absolute;left:24px;top:10px;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1c1c1c,#000);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px}
  .msg .meta{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:3px}
  .msg .name{font-weight:700;font-size:15px}
  .msg .time{color:var(--subtle);font-size:11px;font-family:"JetBrains Mono",Consolas,monospace}
  .msg .ts-inline{position:absolute;left:0;width:70px;text-align:right;color:var(--subtle);font-size:10px;line-height:22px;opacity:0;padding-right:8px;font-family:"JetBrains Mono",Consolas,monospace}
  .msg:not(.first):hover .ts-inline{opacity:1}
  .msg .text{color:#d4d4d4;white-space:pre-wrap;word-wrap:break-word;font-size:15px}
  .msg:hover{background:rgba(255,255,255,.02)}
  .msg.system .text{color:var(--muted);font-style:italic}
  .msg.private{background:linear-gradient(90deg,rgba(212,175,55,.09),transparent 80%);border-left:2px solid var(--gold);padding-left:76px}
  .msg.private .text{color:#fde68a}
  .msg.dice .text,.msg.omikuji .text{color:#c4b5fd}

  /* input */
  #inputbox{padding:8px 24px 22px;position:relative}
  #ibwrap{background:var(--input);border:1px solid var(--line);border-radius:14px;padding:2px 14px;display:flex;align-items:center;gap:10px;transition:border-color .15s, box-shadow .15s}
  #ibwrap:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.08)}
  #inp{flex:1;background:transparent;border:0;outline:0;color:var(--fg);font-size:15px;padding:14px 0;font-family:inherit;min-width:0}
  #inp::placeholder{color:var(--subtle)}
  #send{background:transparent;border:0;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px;display:flex;align-items:center;font-size:18px;transition:color .15s}
  #send:hover{color:var(--gold)}
  #typing{font-size:12px;color:var(--muted);min-height:20px;padding:6px 26px 0;font-family:"JetBrains Mono",Consolas,monospace;letter-spacing:.3px}
  #typing .err{color:var(--red)}
  #typing .ok{color:var(--ok)}
  #typers{font-size:12px;color:var(--muted);min-height:18px;padding:2px 26px 0;font-family:"JetBrains Mono",Consolas,monospace;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .2s}
  #typers.on{opacity:1}
  #typers .nm{color:#e8e8e8}
  .tdots{display:inline-flex;gap:3px;align-items:center}
  .tdots i{width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block;animation:tbl 1.2s infinite ease-in-out}
  .tdots i:nth-child(2){animation-delay:.15s}
  .tdots i:nth-child(3){animation-delay:.3s}
  @keyframes tbl{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-3px);opacity:1}}
  .reads{margin:2px 0 8px 76px;font-size:10px;color:var(--gold);font-family:"JetBrains Mono",Consolas,monospace;letter-spacing:1.2px;font-weight:700;opacity:.85;text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .reads::before{content:"✓✓";color:var(--gold);font-size:11px}

  /* command palette */
  #pal{position:absolute;left:24px;right:24px;bottom:78px;background:#070707;border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 56px rgba(0,0,0,.7);max-height:300px;overflow:auto;display:none;z-index:5}
  #pal.on{display:block}
  #pal .ph{padding:10px 16px;font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:800;border-bottom:1px solid var(--line);letter-spacing:2px}
  #pal .it{padding:10px 16px;display:flex;align-items:center;cursor:pointer;font-size:14px;border-bottom:1px solid var(--line2)}
  #pal .it:last-child{border-bottom:0}
  #pal .it:hover,#pal .it.sel{background:#141414}
  #pal .it .cmd{color:#fff;font-weight:700;font-family:"JetBrains Mono",Consolas,monospace}
  #pal .it .arg{color:var(--gold);font-family:"JetBrains Mono",Consolas,monospace;font-size:12px;margin-left:8px}
  #pal .it .desc{color:var(--subtle);font-size:11px;margin-left:auto}

  /* auth */
  #auth{position:fixed;inset:0;background:
    radial-gradient(1000px 600px at 50% -10%, rgba(212,175,55,.14), transparent 60%),
    radial-gradient(800px 500px at 50% 110%, rgba(255,255,255,.04), transparent 60%),
    #000;
    display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  #auth .card{background:linear-gradient(180deg,#0f0f0f,#050505);padding:40px;border-radius:20px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.9), 0 0 0 1px var(--line) inset;position:relative;overflow:hidden}
  #auth .card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.7}
  #auth h1{margin:0 0 6px;font-size:32px;text-align:center;font-weight:900;letter-spacing:6px;color:#fff;font-family:Inter,sans-serif}
  #auth h1 .accent{color:var(--gold)}
  #auth .sub{text-align:center;color:var(--muted);font-size:11px;margin-bottom:28px;letter-spacing:3px;text-transform:uppercase;font-weight:600}
  #auth .tabs{display:flex;margin-bottom:24px;background:#000;border:1px solid var(--line);border-radius:10px;padding:3px}
  #auth .tabs button{flex:1;padding:10px;background:transparent;color:var(--muted);border:0;border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;transition:all .2s;letter-spacing:1.5px;text-transform:uppercase}
  #auth .tabs button.on{background:linear-gradient(180deg,#1f1f1f,#0a0a0a);color:#fff;box-shadow:0 0 0 1px var(--line) inset}
  #auth label{display:block;font-size:10px;color:var(--muted);margin-top:18px;text-transform:uppercase;font-weight:800;letter-spacing:2px}
  #auth label .req{color:var(--gold);margin-left:4px}
  #auth input{width:100%;padding:13px 14px;background:#000;border:1px solid var(--line);color:var(--fg);border-radius:8px;font-size:15px;margin-top:8px;font-family:inherit;outline:none;transition:border-color .15s}
  #auth input:focus{border-color:var(--gold)}
  #auth button.go{width:100%;margin-top:26px;padding:14px;background:linear-gradient(180deg,#fff,#d4d4d4);color:#000;border:0;border-radius:10px;font-weight:900;cursor:pointer;font-size:13px;transition:all .2s;letter-spacing:2px;text-transform:uppercase}
  #auth button.go:hover{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#000;box-shadow:0 8px 24px rgba(212,175,55,.3)}
  #auth button.go:disabled{opacity:.5;cursor:wait}
  #auth .err{color:var(--red);margin-top:14px;font-size:13px;min-height:18px;font-weight:600;text-align:center}
  #auth .help{color:var(--subtle);font-size:11px;margin-top:22px;line-height:1.8;padding-top:16px;border-top:1px solid var(--line)}

  #lock{position:fixed;inset:0;background:#000;color:#fff;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:200;text-align:center;padding:24px}
  #lock.on{display:flex}
  #lock h1{color:var(--red);font-size:48px;margin:0 0 12px;letter-spacing:6px;font-family:Inter,sans-serif;font-weight:900}
  #lock p{color:#666;letter-spacing:1px}

  @media(max-width:760px){
    #userpane{display:none}
    .msg{padding-left:62px;padding-right:14px}
    .msg.first .av{left:14px;width:34px;height:34px;font-size:13px}
    .msg.private{padding-left:60px}
    #inputbox{padding:6px 12px 14px}
    #pal{left:12px;right:12px;bottom:74px}
    #topbar{padding:0 14px;gap:8px;height:58px}
    .brand .sub{display:none}
    #mechip .info{display:none}
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">
    <h1>NO<span class="accent">I</span>R</h1>
    <div class="sub">Encrypted Chat Lounge</div>
    <div class="tabs">
      <button id="t-login" class="on">ログイン</button>
      <button id="t-signup">サインアップ</button>
    </div>
    <label>ユーザー名<span class="req">*</span></label>
    <input id="a-name" autocomplete="username" maxlength="24" spellcheck="false" />
    <label>パスワード<span class="req">*</span></label>
    <input id="a-pw" type="password" autocomplete="current-password" maxlength="128" />
    <button class="go" id="a-go">ログイン</button>
    <div class="err" id="a-err"></div>
    <div class="help">
      ・名前は 1〜24 文字（日本語OK・記号は <code>_</code> <code>-</code> のみ）<br>
      ・パスワードは 8 文字以上<br>
      ・名前の重複は不可<br>
      ・ログインしない限りチャットは一切表示されません
    </div>
  </div>
</div>

<!-- BAN LOCK -->
<div id="lock"><div><h1>ACCESS DENIED</h1><p>あなたはこのチャットから禁止されています。</p></div></div>

<!-- APP -->
<div id="app">
  <header id="topbar">
    <div class="brand">
      <div class="logo">m</div>
      <div>
        <div class="ti">min-chat</div>
        <div class="sub">Encrypted Lounge</div>
      </div>
    </div>
    <div class="sp"></div>
    <div class="rt"><span class="dot" id="rtdot"></span><span id="rttext">接続中…</span></div>
    <div id="mechip"></div>
    <button class="iconbtn" id="togUsers" title="メンバー表示切替">👥</button>
  </header>

  <div id="content">
    <div id="chatpane">
      <div id="chat"></div>
      <div id="typers"></div>
      <div id="typing"></div>
      <div id="inputbox">
        <div id="pal"></div>
        <div id="ibwrap">
          <input id="inp" autocomplete="off" placeholder="メッセージを送る   ( / でコマンド一覧 )" maxlength="300"/>
          <button id="send" title="送信">➤</button>
        </div>
      </div>
    </div>
    <aside id="userpane">
      <div class="upane-h"><span>オンライン</span><span class="cnt" id="cnt">0</span></div>
      <div id="userlist"></div>
    </aside>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://gqdeacoiowmdjudekvij.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxZGVhY29pb3dtZGp1ZGVrdmlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzY5ODUsImV4cCI6MjA5NTY1Mjk4NX0.0rzuAPLV-HXDZ5OYNEi9lezwpb9ZOQBXEeKAyW3Du08";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, { auth:{ persistSession:true, autoRefreshToken:true }});

const $ = q => document.querySelector(q);
const esc = s => (s==null?"":String(s)).replace(/[&<>"'`]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;","`":"&#96;"}[c]));
const stripCtl = s => (s||"").replace(/[\u0000-\u0008\u000B-\u001F\u007F]/g,"");

const NAME_RE = /^[\p{L}\p{N}_\-]{1,24}$/u;
const HEX_RE  = /^#[0-9a-fA-F]{6}$/;

const nameToEmail = n => "u_" + btoa(unescape(encodeURIComponent(n))).replace(/[^a-zA-Z0-9]/g,"").toLowerCase().slice(0,40) + "@chat.local";

let me=null, myIgnores=new Set(), chCh=null, prCh=null, presCh=null;
let lastSenderId=null, lastSenderTime=0;
let reconnectTimer=null; // 【追加】再接続タイマー管理
const COMMANDS = [
  {c:"help",a:"",d:"コマンド一覧"},
  {c:"omi",a:"",d:"おみくじ(1日1回)"},
  {c:"color",a:"#RRGGBB | rainbow",d:"名前の色を変更"},
  {c:"dice",a:"個数 上限",d:"サイコロ (例: /dice 2 6)"},

  {c:"unignore",a:"名前",d:"非表示を解除 (管理者+)"},
  {c:"prm",a:"名前 メッセージ",d:"プライベートメッセージ"},
  {c:"nick",a:"",d:"自分のタグ/役職を隠す (管理者+)"},
  {c:"clear",a:"",d:"チャット全消去 (deleter+)"},
  {c:"delete",a:"名前",d:"対象の発言を全削除 (deleter+)"},
  {c:"mute",a:"名前 ?d?h?m",d:"対象をミュート (deleter+)"},
  {c:"ipmute",a:"名前 ?d?h?m",d:"IPベースでミュート (管理者+)"},
  {c:"unmute",a:"名前",d:"ミュート解除 (管理者+)"},
  {c:"ban",a:"名前",d:"対象をBAN (管理者+)"},
  {c:"unban",a:"名前",d:"BAN解除 (管理者+)"},
  {c:"ipignore",a:"名前",d:"対象を全体に非表示 (管理者+)"},
  {c:"addd",a:"名前",d:"deleter付与 (管理者+)"},
  {c:"adda",a:"名前",d:"管理者付与 (創設者)"},
  {c:"remove",a:"名前",d:"権限剥奪"},
  {c:"dp",a:"名前",d:"IP暴露+BAN (創設者)"},
  {c:"sys-check",a:"",d:"システム確認 (創設者)"},
  {c:"sys-clone",a:"",d:"スナップショット (創設者)"},
  {c:"sys-roll",a:"",d:"ロールバック (創設者)"},
];

// ===== AUTH =====
let mode = "login";
const setMode = m => {
  mode = m;
  $("#t-login").classList.toggle("on", m==="login");
  $("#t-signup").classList.toggle("on", m==="signup");
  $("#a-go").textContent = m==="login" ? "ログイン" : "アカウント作成";
  $("#a-pw").autocomplete = m==="login" ? "current-password" : "new-password";
};
$("#t-login").onclick = ()=>setMode("login");
$("#t-signup").onclick = ()=>setMode("signup");
$("#a-name").onkeydown = e => { if(e.key==="Enter") $("#a-pw").focus(); };
$("#a-pw").onkeydown   = e => { if(e.key==="Enter") $("#a-go").click(); };

$("#a-go").onclick = async () => {
  const name = $("#a-name").value.trim();
  const pw = $("#a-pw").value;
  $("#a-err").textContent="";
  if(!NAME_RE.test(name)){ $("#a-err").textContent="名前は1〜24文字の文字・数字・_-のみ"; return; }
  if(pw.length < 8){ $("#a-err").textContent="パスワードは8文字以上"; return; }
  if(pw.length > 128){ $("#a-err").textContent="パスワードが長すぎます"; return; }
  const email = nameToEmail(name);
  const btn = $("#a-go"); btn.disabled = true;
  try{
    if(mode==="signup"){
      const { data: ex } = await sb.from("profiles").select("user_id").eq("name", name).maybeSingle();
      if(ex){ $("#a-err").textContent="その名前は既に使用されています"; return; }
      const { error } = await sb.auth.signUp({ email, password: pw, options:{ data:{ name } } });
      if(error) throw error;
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password: pw });
      if(error) throw new Error("名前またはパスワードが違います");
    }
    await boot();
  } catch(e){ $("#a-err").textContent = e.message || String(e); }
  finally{ btn.disabled = false; }
};

// ===== BOOT =====
async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ $("#auth").style.display="flex"; $("#app").classList.remove("on"); return; }
  const { data, error } = await sb.rpc("login_check");
  if(error){ $("#a-err").textContent = error.message; return; }
  if(!data.ok){
    if(data.error==="banned"){ $("#lock").classList.add("on"); await sb.auth.signOut().catch(()=>{}); return; }
    $("#a-err").textContent = data.error;
    return;
  }
  me = data.profile;
  $("#auth").style.display="none";
  $("#app").classList.add("on");
  renderMe();
  await loadIgnores();
  await loadMessages();
  // ※ loadUsers() はPresenceのsyncで自動実行されるため不要
  subscribe();
  $("#chat").addEventListener("scroll", scheduleReadSync, { passive:true });
  window.addEventListener("focus", scheduleReadSync);
  window.addEventListener("pagehide", stopTyping);
  $("#inp").focus();
}

function roleBadge(r){
  if(r==="founder") return `<span class="badge b-founder">創設者</span>`;
  if(r==="admin")   return `<span class="badge b-admin">管理者</span>`;
  if(r==="deleter") return `<span class="badge b-deleter">DELETER</span>`;
  return "";
}
function safeColor(c){ return HEX_RE.test(c||"") ? c : (c==="rainbow"?"rainbow":"#ffffff"); }
function nameHtml(name, color){
  const c = safeColor(color);
  if(c==="rainbow") return `<span class="rainbow">${esc(name)}</span>`;
  return `<span style="color:${c}">${esc(name)}</span>`;
}

function renderMe(){
  const hideTag = me.nick_hidden || me.role==="founder";
  const tag = hideTag ? "" : `<span class="tag">#${String(me.tag).padStart(5,"0")}</span>`;
  const badge = me.nick_hidden ? "" : roleBadge(me.role);
  const initial = esc((me.name||"?").slice(0,1));
  $("#mechip").innerHTML = `
    <div class="av">${initial}</div>
    <div class="info">
      <div class="nm">${nameHtml(me.name, me.name_color)} ${badge}</div>
      <div class="sub">${tag} オンライン</div>
    </div>
    <button id="logout" title="ログアウト">⏻</button>`;
  $("#logout").onclick = async () => { await sb.auth.signOut(); location.reload(); };
}

async function loadIgnores(){
  const { data } = await sb.from("ignores").select("target_user_id").eq("by_user_id", me.user_id);
  myIgnores = new Set((data||[]).map(x=>x.target_user_id));
}

async function loadMessages(){
  const { data, error } = await sb.from("messages").select("*").order("id",{ascending:true}).limit(200);
  if(error){ console.error(error); return; }
  $("#chat").innerHTML="";
  lastSenderId=null; lastSenderTime=0;
  (data||[]).forEach(addMsg);
  scrollBot(true);
}

// 【変更】Presenceベースのオンラインユーザー描画
function renderOnlineUsers(state){
  const ul = $("#userlist");
  ul.innerHTML = "";
  const list = [];

  for(const presences of Object.values(state)){
    if(presences.length > 0) list.push(presences[0]);
  }

  const rank = r => r==="founder"?4:r==="admin"?3:r==="deleter"?2:1;
  list.sort((a,b)=>rank(b.role)-rank(a.role) || a.name.localeCompare(b.name,"ja"));

  list.forEach(u=>{
    const hideTag = u.nick_hidden || u.role==="founder";
    const tag = hideTag ? "" : `<span class="tag">#${String(u.tag).padStart(5,"0")}</span>`;
    const badge = u.nick_hidden ? "" : roleBadge(u.role);
    const d = document.createElement("div");
    d.className = "u";
    d.innerHTML = `<div class="av">${esc((u.name||"?").slice(0,1))}</div>
      <div class="nm">${nameHtml(u.name,u.name_color)} ${tag} ${badge}</div>`;
    ul.appendChild(d);
  });

  $("#cnt").textContent = String(list.length).padStart(2,"0");
}

function fmtTime(d){ return new Date(d).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}); }
function fmtDay(d){ const x=new Date(d); return `${x.getMonth()+1}/${x.getDate()} ${fmtTime(d)}`; }

let latestMsgId = 0;
function addMsg(m){
  if(m.hidden_global) return;
  if(myIgnores.has(m.user_id)) return;
  if(m.kind==="private" && m.user_id!==me.user_id && m.target_user_id!==me.user_id) return;

  const t = new Date(m.created_at).getTime();
  const grouped = (m.user_id===lastSenderId) && (t-lastSenderTime < 5*60*1000) && m.kind!=="private";
  lastSenderId = m.user_id; lastSenderTime = t;

  const hideTag = m.nick_hidden_snapshot || m.role_snapshot==="founder" || !m.tag_snapshot;
  const tag = hideTag ? "" : `<span class="tag">#${String(m.tag_snapshot).padStart(5,"0")}</span>`;
  const badge = m.nick_hidden_snapshot ? "" : roleBadge(m.role_snapshot);
  const prefix = m.kind==="private" ? (m.target_user_id===me.user_id?`📨 from `:`📨 to `) : "";
  const initial = esc((m.name_snapshot||"?").slice(0,1));

  const el = document.createElement("div");
  el.className = "msg " + (m.kind||"chat") + (grouped?"":" first");
  el.dataset.id = m.id;
  el.dataset.uid = m.user_id || "";
  el.dataset.kind = m.kind || "chat";
  if(grouped){
    el.innerHTML = `<span class="ts-inline">${fmtTime(m.created_at)}</span><div class="text">${esc(stripCtl(m.content))}</div>`;
  } else {
    el.innerHTML = `
      <div class="av">${initial}</div>
      <div class="meta">${prefix}<span class="name">${nameHtml(m.name_snapshot,m.color_snapshot)}</span>${tag} ${badge} <span class="time">${fmtDay(m.created_at)}</span></div>
      <div class="text">${esc(stripCtl(m.content))}</div>`;
  }
  $("#chat").appendChild(el);
  if(m.id > latestMsgId) latestMsgId = m.id;
  scheduleReadSync();
  updateReadBadges();
}

function scrollBot(force){
  const c=$("#chat");
  const near = c.scrollHeight - c.scrollTop - c.clientHeight < 200;
  if(force || near){ c.scrollTop = c.scrollHeight; scheduleReadSync(); }
}

function setRt(ok, label){
  $("#rtdot").classList.toggle("ng", !ok);
  $("#rttext").textContent = label || (ok?"LIVE":"OFFLINE");
}

// 【変更】subscribe：再接続ロジック＋Presence統合
function subscribe(){
  // 既存チャンネルをすべてクリーンアップ
  if(chCh){ sb.removeChannel(chCh); chCh=null; }
  if(prCh){ sb.removeChannel(prCh); prCh=null; }
  if(presCh){ sb.removeChannel(presCh); presCh=null; }
  if(reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer=null; }

  // メッセージ購読
  chCh = sb.channel("messages-rt")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"}, p=>{ addMsg(p.new); scrollBot(); })
    .on("postgres_changes",{event:"DELETE",schema:"public",table:"messages"}, p=>{
      const el=document.querySelector(`.msg[data-id="${p.old.id}"]`); if(el) el.remove();
    })
    .subscribe((status)=>{
      if(status==="SUBSCRIBED"){
        setRt(true,"LIVE");
      } else if(status==="CHANNEL_ERROR" || status==="TIMED_OUT" || status==="CLOSED"){
        setRt(false,"再接続中…");
        // 5秒後に全チャンネル再接続
        if(!reconnectTimer){
          reconnectTimer = setTimeout(()=>{ reconnectTimer=null; subscribe(); }, 5000);
        }
      }
    });

  // プロフィール変更購読
  prCh = sb.channel("profiles-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"profiles"}, async ()=>{
      const { data } = await sb.rpc("login_check");
      if(data?.ok){ me = data.profile; renderMe(); }
    }).subscribe();

  // 【追加】Presenceでオンラインユーザー管理
  presCh = sb.channel("presence-rt", {
    config: { presence: { key: me.user_id } }
  });
  presCh.on("presence", { event:"sync" }, ()=>{
    renderOnlineUsers(presCh.presenceState());
  });
  presCh.subscribe(async (status)=>{
    if(status==="SUBSCRIBED"){
      await presCh.track({
        user_id:   me.user_id,
        name:      me.name,
        tag:       me.tag,
        role:      me.role,
        name_color:me.name_color,
        nick_hidden:me.nick_hidden
      });
    }
  });

  setupTyping();
  setupReads();
}

// ===== TYPING INDICATOR =====
let tyCh=null, lastTypingSent=0, lastTypingText="", typingIdleTimer=null, typingActive=false;
const typers = new Map();
function renderTypers(){
  const now=Date.now();
  for(const [k,v] of typers) if(v.exp<now){ typers.delete(k); }
  const list=[...typers.values()];
  const el=$("#typers");
  if(!list.length){ el.classList.remove("on"); el.innerHTML=""; return; }
  const names = list.slice(0,3).map(v=>`<span class="nm">${nameHtml(v.name,v.color)}</span>`).join("、");
  const extra = list.length>3 ? ` 他${list.length-3}人` : "";
  el.innerHTML = `<span class="tdots"><i></i><i></i><i></i></span><span>${names}${extra} が入力中…</span>`;
  el.classList.add("on");
}
setInterval(renderTypers, 1500);
function setupTyping(){
  if(tyCh) sb.removeChannel(tyCh);
  tyCh = sb.channel("typing-rt", { config:{ broadcast:{ self:false }}});
  tyCh.on("broadcast",{event:"t"}, ({payload})=>{
    if(!payload || payload.id===me.user_id) return;
    if(myIgnores.has(payload.id)) return;
    typers.set(payload.id, { name:payload.name, color:payload.color, exp:Date.now()+4000 });
    renderTypers();
  });
  tyCh.on("broadcast",{event:"st"}, ({payload})=>{
    if(!payload) return;
    typers.delete(payload.id); renderTypers();
  });
  tyCh.subscribe();
}
function sendTyping(text){
  if(!tyCh||!me) return;
  if(text===lastTypingText) { armTypingIdle(); return; }
  lastTypingText = text;
  const now=Date.now();
  if(typingActive && now-lastTypingSent < 2000){ armTypingIdle(); return; }
  lastTypingSent=now; typingActive=true;
  tyCh.send({ type:"broadcast", event:"t", payload:{ id:me.user_id, name:me.name, color:me.name_color }});
  armTypingIdle();
}
function armTypingIdle(){
  if(typingIdleTimer) clearTimeout(typingIdleTimer);
  typingIdleTimer = setTimeout(stopTyping, 2200);
}
function stopTyping(){
  if(typingIdleTimer){ clearTimeout(typingIdleTimer); typingIdleTimer=null; }
  if(!tyCh||!me||!typingActive) return;
  typingActive=false; lastTypingSent=0; lastTypingText="";
  tyCh.send({ type:"broadcast", event:"st", payload:{ id:me.user_id }});
}

// ===== READ RECEIPTS =====
let rdCh=null, myLastRead=0, lastReadSent=0, readSyncTimer=null;
const reads = new Map();
function setupReads(){
  if(rdCh) sb.removeChannel(rdCh);
  rdCh = sb.channel("reads-rt", { config:{ broadcast:{ self:false }}});
  rdCh.on("broadcast",{event:"r"}, ({payload})=>{
    if(!payload || payload.id===me.user_id) return;
    if(myIgnores.has(payload.id)) return;
    const prev = reads.get(payload.id)||0;
    if(payload.n > prev){ reads.set(payload.id, payload.n); updateReadBadges(); }
  });
  rdCh.on("broadcast",{event:"hi"}, ()=>{
    if(myLastRead) sendRead(true);
  });
  rdCh.subscribe(s=>{
    if(s==="SUBSCRIBED"){
      rdCh.send({type:"broadcast",event:"hi",payload:{id:me.user_id}});
      if(myLastRead) sendRead(true);
    }
  });
}
function scheduleReadSync(){
  if(document.hidden) return;
  if(readSyncTimer) return;
  readSyncTimer = setTimeout(()=>{
    readSyncTimer=null;
    const c=$("#chat");
    const atBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 120;
    if(atBottom && latestMsgId>myLastRead){
      myLastRead = latestMsgId;
      sendRead(false);
      updateReadBadges();
    }
  }, 400);
}
function sendRead(force){
  if(!rdCh||!me||!myLastRead) return;
  const now=Date.now();
  if(!force && now-lastReadSent < 1200) return;
  lastReadSent=now;
  rdCh.send({type:"broadcast",event:"r",payload:{id:me.user_id, n:myLastRead}});
}
function updateReadBadges(){
  if(!me) return;
  document.querySelectorAll("#chat .reads").forEach(el=>el.remove());
  const own = [...document.querySelectorAll(`#chat .msg[data-uid="${me.user_id}"]`)]
    .filter(el=>el.dataset.kind!=="private");
  if(!own.length) return;
  const last = own[own.length-1];
  const lastId = Number(last.dataset.id||0);
  if(!lastId) return;
  let n=0;
  for(const [uid,rid] of reads){ if(uid!==me.user_id && rid>=lastId) n++; }
  if(n<=0) return;
  const tag = document.createElement("div");
  tag.className="reads";
  tag.textContent = `既読 ${n}`;
  last.after(tag);
}
document.addEventListener("visibilitychange", ()=>{
  if(!document.hidden) scheduleReadSync();
});

// 3-min health check
setInterval(async ()=>{
  const t0=Date.now(); const ch=sb.channel("ping-"+t0); let got=false;
  ch.on("broadcast",{event:"p"},()=>{ got=true; });
  await ch.subscribe(async s=>{
    if(s==="SUBSCRIBED"){
      await ch.send({type:"broadcast",event:"p",payload:{}});
      setTimeout(async ()=>{
        if(got) setRt(true, "LIVE "+new Date().toLocaleTimeString("ja-JP"));
        else { setRt(false,"⚠ ROLLBACK"); if(me?.role==="founder") await sb.rpc("run_command",{p_cmd:"sys-roll",p_args:""}); }
        sb.removeChannel(ch);
      }, 1500);
    }
  });
}, 180000);

// Command palette
function renderPal(prefix){
  const items = COMMANDS.filter(x=>x.c.startsWith(prefix));
  if(!items.length){ $("#pal").classList.remove("on"); return; }
  $("#pal").innerHTML = `<div class="ph">コマンド  matches /${esc(prefix)}</div>` +
    items.map((x,i)=>`<div class="it${i===0?" sel":""}" data-c="${esc(x.c)}"><div><span class="cmd">/${esc(x.c)}</span><span class="arg">${esc(x.a)}</span></div><span class="desc">${esc(x.d)}</span></div>`).join("");
  $("#pal").classList.add("on");
  $("#pal").querySelectorAll(".it").forEach(el=>{
    el.onclick = ()=>{ $("#inp").value = "/"+el.dataset.c+" "; $("#pal").classList.remove("on"); $("#inp").focus(); };
  });
}
$("#inp").addEventListener("input", e=>{
  const v = e.target.value;
  if(v.startsWith("/") && !/\s/.test(v)) renderPal(v.slice(1).toLowerCase());
  else $("#pal").classList.remove("on");
  const trimmed = v.trim();
  if(trimmed && !v.startsWith("/")) sendTyping(trimmed);
  else stopTyping();
});
$("#inp").addEventListener("blur", stopTyping);
$("#inp").addEventListener("keydown", e=>{
  if(e.key==="Escape"){ $("#pal").classList.remove("on"); }
});

function flash(msg, kind){ const t=$("#typing"); t.innerHTML = `<span class="${kind||"err"}">${esc(msg)}</span>`; setTimeout(()=>{ t.innerHTML=""; }, 4000); }

document.getElementById("send").onclick = submit;
$("#inp").addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); submit(); }});

async function submit(){
  let v = stripCtl($("#inp").value).trim();
  if(!v) return;
  if(v.length > 300){ flash("300字以上は送信不可"); return; }
  $("#inp").value=""; $("#pal").classList.remove("on"); stopTyping();

  if(v.startsWith("/")){
    const sp = v.indexOf(" ");
    const cmd = (sp<0?v.slice(1):v.slice(1,sp)).toLowerCase();
    const args = sp<0?"":v.slice(sp+1);
    if(cmd==="help"){
      flash("コマンド: " + COMMANDS.map(x=>"/"+x.c).join(" "), "ok"); return;
    }
    if(cmd==="color" && args && args!=="rainbow" && !HEX_RE.test(args.trim())){
      flash("色は #RRGGBB か rainbow"); return;
    }
    const { data, error } = await sb.rpc("run_command", { p_cmd: cmd, p_args: args });
    if(error){ flash(error.message); return; }
    if(!data.ok) flash(data.error);
    else if(data.result) flash("🎴 "+data.result, "ok");
    if(cmd==="ignore"||cmd==="unignore") await loadIgnores();
    if(cmd==="color"||cmd==="nick"){
      const { data:d2 } = await sb.rpc("login_check");
      if(d2?.ok){
        me=d2.profile; renderMe();
        // Presenceのトラッキング情報も更新
        if(presCh) await presCh.track({
          user_id:    me.user_id,
          name:       me.name,
          tag:        me.tag,
          role:       me.role,
          name_color: me.name_color,
          nick_hidden:me.nick_hidden
        });
      }
    }
  } else {
    const { data, error } = await sb.rpc("send_message", { p_content: v });
    if(error){ flash(error.message); return; }
    if(!data.ok){
      const map = {muted:"ミュート中です",banned:"BANされています",too_long:"300字以上は送信できません",too_fast:"3秒以内の連投は禁止",duplicate:"直前と同じ内容は送れません",zalgo:"zalgo文字は禁止",forbidden_link:"html.cafe リンクは禁止",empty:"空メッセージ",not_logged_in:"ログインしていません"};
      flash(map[data.error]||data.error);
    }
  }
}

$("#togUsers").onclick = ()=>{ const p=$("#userpane"); p.style.display = p.style.display==="none"?"":"none"; };

// 【変更】サインアウト時のみリロード、TOKEN_REFRESHED時は再接続
sb.auth.onAuthStateChange((event)=>{
  if(event==="SIGNED_OUT"){
    location.reload();
  } else if(event==="TOKEN_REFRESHED"){
    // トークン更新後、チャンネルを再接続（リロード不要）
    if(me) subscribe();
  }
});

boot();
