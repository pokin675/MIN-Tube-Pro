<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="referrer" content="no-referrer" />
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
<title>min-chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;--bg2:#0f0f0f;--bg3:#141414;
    --line:#242424;--line2:#1a1a1a;
    --fg:#f5f5f5;--muted:#8a8a8a;--subtle:#5e5e5e;
    --gold:#3b82f6;--gold2:#1d4ed8;--red:#e53935;--ok:#22c55e;--warn:#f59e0b;
    --input:#101010;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:"Noto Sans JP",Inter,"Helvetica Neue",Arial,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  body{background:
    radial-gradient(1200px 600px at 90% -10%, rgba(59,130,246,.07), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(255,255,255,.04), transparent 60%),
    var(--bg)}
  button{font-family:inherit}
  code{font-family:"JetBrains Mono",Consolas,monospace;font-size:12px;background:#000;padding:1px 6px;border:1px solid var(--line);border-radius:4px;color:var(--gold)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#1f1f1f;border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#2a2a2a}
  ::-webkit-scrollbar-track{background:transparent}

  #app{display:none;height:100dvh;flex-direction:column}
  #app.on{display:flex}

  /* topbar */
  #topbar{height:64px;display:flex;align-items:center;gap:14px;padding:0 24px;border-bottom:1px solid var(--line);background:rgba(10,10,10,.85);backdrop-filter:blur(14px);position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1a1a1a,#000);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:900;font-size:18px;box-shadow:0 0 18px rgba(59,130,246,.18), inset 0 0 12px rgba(59,130,246,.05);font-family:Inter,sans-serif}
  .brand .ti{font-size:18px;font-weight:900;letter-spacing:3px;font-family:Inter,sans-serif}
  .brand .sub{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
  .sp{flex:1}
  .rt{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:#000}
  .rt .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok)}
  .rt .dot.ng{background:var(--red);box-shadow:0 0 10px var(--red);animation:bp 1s infinite}
  @keyframes bp{50%{opacity:.3}}
  .iconbtn{background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;padding:8px 12px;border-radius:10px;font-size:13px;transition:all .15s}
  .iconbtn:hover{color:#fff;border-color:#3a3a3a;background:#141414}

  #mechip{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 5px;border:1px solid var(--line);border-radius:999px;background:#000}
  #mechip .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#222,#000);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--gold);font-size:13px;border:1px solid var(--line)}
  #mechip .info{display:flex;flex-direction:column;line-height:1.2;min-width:0;max-width:160px}
  #mechip .info .nm{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #mechip .info .sub{font-size:10px;color:var(--muted);letter-spacing:.5px}
  #mechip button{background:transparent;border:0;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px}
  #mechip button:hover{color:var(--red)}

  /* main */
  #content{flex:1;display:grid;grid-template-columns:minmax(0,1fr) 360px 280px;min-height:0;max-width:1700px;width:100%;margin:0 auto}
  #chatpane{display:flex;flex-direction:column;min-width:0;min-height:0}
  #chat{flex:1;overflow-y:auto;padding:24px 0 4px;scroll-behavior:auto}

  /* member list */
  #userpane{overflow:auto;padding:24px 14px;border-left:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.012),transparent 30%)}
  .upane-h{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;padding:6px 12px 14px;letter-spacing:2.5px;display:flex;justify-content:space-between;align-items:center}
  .upane-h .cnt{color:var(--gold);font-family:"JetBrains Mono",monospace;letter-spacing:0;font-size:11px}
  .u{padding:8px 10px;border-radius:10px;display:flex;align-items:center;gap:10px;cursor:default;transition:background .15s}
  .u:hover{background:#141414}
  .u .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1f1f1f,#0a0a0a);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px;flex:none;position:relative;border:1px solid var(--line)}
  .u .av::after{content:"";position:absolute;right:-1px;bottom:-1px;width:10px;height:10px;border-radius:50%;background:var(--ok);border:2px solid var(--bg)}
  .u .nm{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .u .ucol{min-width:0;flex:1;display:flex;flex-direction:column;gap:2px}
  .u .ust{font-size:11px;color:var(--muted);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .msg .ust-inline{color:var(--subtle);font-size:11px;font-style:italic;margin-left:2px}
  #topicbar{display:none;align-items:center;gap:10px;padding:10px 24px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(59,130,246,.08),transparent);font-size:13px;color:#cfdcff}
  #topicbar.on{display:flex}
  #topicbar .label{font-size:10px;font-weight:900;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-family:Inter,sans-serif}
  #topicbar .txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* badges (Japanese) */
  .badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:800;letter-spacing:1.5px;display:inline-flex;align-items:center;line-height:1.5;border:1px solid transparent;font-family:"Noto Sans JP",sans-serif}
  .b-founder{background:linear-gradient(135deg,#0b1d3a,#04122a);color:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(59,130,246,.3)}
  .b-admin{background:#1c1c1c;color:#f5f5f5;border-color:#7a7a7a}
  .b-deleter{background:#1c1c1c;color:#9ca3af;border-color:#374151}
  .tag{color:var(--subtle);font-size:11px;font-weight:500;font-family:"JetBrains Mono",Consolas,monospace}

  .rainbow{background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcf7f,#4d96ff,#9b59f6,#ff6b6b);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:rb 4s linear infinite;font-weight:800}
  @keyframes rb{to{background-position:200% center}}

  /* messages */
  .msg{padding:2px 24px 2px 78px;position:relative;min-height:22px}
  .msg.first{margin-top:18px;padding-top:8px;padding-bottom:8px;min-height:48px}
  .msg.first .av{position:absolute;left:24px;top:10px;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1c1c1c,#000);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px}
  .msg .meta{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:3px}
  .msg .name{font-weight:700;font-size:15px}
  .msg .time{color:var(--subtle);font-size:11px;font-family:"JetBrains Mono",Consolas,monospace}
  .msg .ts-inline{position:absolute;left:0;width:70px;text-align:right;color:var(--subtle);font-size:10px;line-height:22px;opacity:0;padding-right:8px;font-family:"JetBrains Mono",Consolas,monospace}
  .msg:not(.first):hover .ts-inline{opacity:1}
  .msg .text{color:#d4d4d4;white-space:pre-wrap;word-wrap:break-word;font-size:15px}
  .msg:hover{background:rgba(255,255,255,.02)}
  .msg.system .text{color:var(--muted);font-style:italic}
  .msg.private{background:linear-gradient(90deg,rgba(59,130,246,.09),transparent 80%);border-left:2px solid var(--gold);padding-left:76px}
  .msg.private .text{color:#fde68a}
  .msg.dice .text,.msg.omikuji .text{color:#c4b5fd}

  /* input */
  #inputbox{padding:8px 24px 22px;position:relative}
  #ibwrap{background:var(--input);border:1px solid var(--line);border-radius:14px;padding:2px 14px;display:flex;align-items:center;gap:10px;transition:border-color .15s, box-shadow .15s}
  #ibwrap:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
  #inp{flex:1;background:transparent;border:0;outline:0;color:var(--fg);font-size:15px;padding:14px 0;font-family:inherit;min-width:0}
  #inp::placeholder{color:var(--subtle)}
  #send{background:transparent;border:0;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px;display:flex;align-items:center;font-size:18px;transition:color .15s}
  #send:hover{color:var(--gold)}
  #typing{font-size:12px;color:var(--muted);min-height:20px;padding:6px 26px 0;font-family:"JetBrains Mono",Consolas,monospace;letter-spacing:.3px}
  #typing .err{color:var(--red)}
  #typing .ok{color:var(--ok)}
  #typers{font-size:12px;color:var(--muted);min-height:18px;padding:2px 26px 0;font-family:"JetBrains Mono",Consolas,monospace;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .2s}
  #typers.on{opacity:1}
  #typers .nm{color:#e8e8e8}
  .tdots{display:inline-flex;gap:3px;align-items:center}
  .tdots i{width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block;animation:tbl 1.2s infinite ease-in-out}
  .tdots i:nth-child(2){animation-delay:.15s}
  .tdots i:nth-child(3){animation-delay:.3s}
  @keyframes tbl{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-3px);opacity:1}}
  .reads{width:fit-content;margin:4px 24px 8px auto;font-size:10px;color:var(--gold);font-family:"JetBrains Mono",Consolas,monospace;letter-spacing:1.2px;font-weight:700;opacity:.85;text-transform:uppercase;display:flex;align-items:center;justify-content:flex-end;gap:6px;text-align:right}
  .reads::before{content:"✓✓";color:var(--gold);font-size:11px}

  /* command palette */
  #pal{position:absolute;left:24px;right:24px;bottom:78px;background:#070707;border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 56px rgba(0,0,0,.7);max-height:300px;overflow:auto;display:none;z-index:5}
  #pal.on{display:block}
  #pal .ph{padding:10px 16px;font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:800;border-bottom:1px solid var(--line);letter-spacing:2px}
  #pal .it{padding:10px 16px;display:flex;align-items:center;cursor:pointer;font-size:14px;border-bottom:1px solid var(--line2)}
  #pal .it:last-child{border-bottom:0}
  #pal .it:hover,#pal .it.sel{background:#141414}
  #pal .it .cmd{color:#fff;font-weight:700;font-family:"JetBrains Mono",Consolas,monospace}
  #pal .it .arg{color:var(--gold);font-family:"JetBrains Mono",Consolas,monospace;font-size:12px;margin-left:8px}
  #pal .it .desc{color:var(--subtle);font-size:11px;margin-left:auto;text-align:right;padding-left:10px}
  #pal .hint{padding:12px 16px;border-bottom:1px solid var(--line2);color:#cfcfcf;font-size:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  #pal .hint code{color:var(--gold);background:#020202}
  #pal .swatches{padding:12px 16px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;border-bottom:1px solid var(--line2)}
  #pal .sw{height:34px;border:1px solid var(--line);border-radius:8px;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}

  /* games */
  #gamepane{overflow:auto;padding:18px 14px;border-left:1px solid var(--line);background:linear-gradient(180deg,rgba(59,130,246,.035),transparent 38%)}
  .gp-head{font-size:10px;font-weight:900;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;padding:6px 8px 14px;display:flex;align-items:center;justify-content:space-between}
  .gp-head #gstatus{color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:1px}
  .room{border:1px solid var(--line);background:linear-gradient(180deg,#0c0c0c,#060606);border-radius:14px;margin-bottom:14px;overflow:hidden;transition:all .2s;position:relative}
  .room:hover{border-color:#2c2c2c}
  .room.on{border-color:rgba(59,130,246,.6);box-shadow:0 0 0 1px rgba(59,130,246,.15) inset, 0 8px 30px rgba(59,130,246,.12)}
  .room.on::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .room-h{padding:14px 14px 10px;display:flex;align-items:center;gap:10px}
  .room-num{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1a1a1a,#000);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:900;font-family:Inter,sans-serif;color:var(--gold);font-size:13px}
  .room.on .room-num{border-color:var(--gold);box-shadow:0 0 12px rgba(59,130,246,.3)}
  .room-title{font-weight:800;font-size:13px;letter-spacing:.5px;display:flex;flex-direction:column;gap:2px;line-height:1.2}
  .room-title .gname{color:#fff}
  .room-title .gsub{color:var(--subtle);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:Inter,sans-serif}
  .room-meta{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .room-meta .badge-cnt{font-size:10px;color:#d4d4d4;background:#000;border:1px solid var(--line);border-radius:999px;padding:3px 9px;font-family:"JetBrains Mono",monospace;letter-spacing:.5px}
  .room-meta .badge-cnt b{color:var(--gold);font-weight:700}
  .room-meta .stat{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:800;font-family:Inter,sans-serif}
  .room-meta .stat.live{color:var(--ok)}
  .room-meta .stat.lobby{color:var(--warn)}
  .room-body{padding:0 14px 14px;display:grid;gap:10px}
  .gamepick{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .mini-btn{background:#0d0d0d;border:1px solid var(--line);color:#dcdcdc;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
  .mini-btn:hover{border-color:var(--gold);color:#fff;background:#141414;transform:translateY(-1px)}
  .mini-btn.primary{background:linear-gradient(180deg,#fff,#d4d4d4);color:#000;border-color:#fff}
  .mini-btn.primary:hover{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#000;border-color:var(--gold)}
  .mini-btn.ghost{background:transparent}
  .mini-btn.danger:hover{border-color:var(--red);color:var(--red)}
  .mini-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .players{display:flex;flex-wrap:wrap;gap:5px;min-height:24px}
  .pill{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:#ddd;background:#050505;display:inline-flex;align-items:center;gap:5px}
  .pill::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--ok)}
  .pill.me{border-color:var(--gold);background:rgba(59,130,246,.08)}
  .pill.sp{color:var(--muted);opacity:.7}.pill.sp::before{background:var(--muted)}
  .pill.empty{color:var(--subtle);font-style:italic}.pill.empty::before{display:none}
  .game-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .game-actions.three{grid-template-columns:1fr 1fr 1fr}
  .game-state{font-size:12px;color:#cfcfcf;border-top:1px solid var(--line2);padding-top:10px;margin-top:4px}
  .hand{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
  .card{min-width:30px;text-align:center;border:1px solid var(--line);background:#111;border-radius:6px;padding:4px 6px;font-family:"JetBrains Mono",monospace;font-size:12px}
  .board{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-top:8px;background:#061b12;border:1px solid #123522;padding:4px;border-radius:8px}
  .cell{aspect-ratio:1;background:#0b5a38;border:1px solid rgba(255,255,255,.08);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .disc{width:70%;height:70%;border-radius:50%}.disc.B{background:#050505;border:1px solid #333}.disc.W{background:#f5f5f5;border:1px solid #ddd}
  #roomchat{margin-top:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#060606}#roomchat .rh{padding:10px 12px;border-bottom:1px solid var(--line);font-size:11px;color:var(--gold);font-weight:900;letter-spacing:2px;text-transform:uppercase}#roommsgs{max-height:180px;overflow:auto;padding:8px 10px;font-size:12px}.rmsg{padding:4px 0;color:#d6d6d6}.rmsg .rn{font-weight:800}.rinput{display:flex;border-top:1px solid var(--line)}#rinp{flex:1;background:#050505;border:0;color:#fff;padding:10px;outline:0}#rsend{background:#111;border:0;border-left:1px solid var(--line);color:var(--gold);padding:0 12px;cursor:pointer}

  /* auth */
  #auth{position:fixed;inset:0;background:
    radial-gradient(1000px 600px at 50% -10%, rgba(59,130,246,.14), transparent 60%),
    radial-gradient(800px 500px at 50% 110%, rgba(255,255,255,.04), transparent 60%),
    #000;
    display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  #auth .card{background:linear-gradient(180deg,#0f0f0f,#050505);padding:40px;border-radius:20px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.9), 0 0 0 1px var(--line) inset;position:relative;overflow:hidden}
  #auth .card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.7}
  #auth h1{margin:0 0 6px;font-size:32px;text-align:center;font-weight:900;letter-spacing:6px;color:#fff;font-family:Inter,sans-serif}
  #auth h1 .accent{color:var(--gold)}
  #auth .sub{text-align:center;color:var(--muted);font-size:11px;margin-bottom:28px;letter-spacing:3px;text-transform:uppercase;font-weight:600}
  #auth .tabs{display:flex;margin-bottom:24px;background:#000;border:1px solid var(--line);border-radius:10px;padding:3px}
  #auth .tabs button{flex:1;padding:10px;background:transparent;color:var(--muted);border:0;border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;transition:all .2s;letter-spacing:1.5px;text-transform:uppercase}
  #auth .tabs button.on{background:linear-gradient(180deg,#1f1f1f,#0a0a0a);color:#fff;box-shadow:0 0 0 1px var(--line) inset}
  #auth label{display:block;font-size:10px;color:var(--muted);margin-top:18px;text-transform:uppercase;font-weight:800;letter-spacing:2px}
  #auth label .req{color:var(--gold);margin-left:4px}
  #auth input{width:100%;padding:13px 14px;background:#000;border:1px solid var(--line);color:var(--fg);border-radius:8px;font-size:15px;margin-top:8px;font-family:inherit;outline:none;transition:border-color .15s}
  #auth input:focus{border-color:var(--gold)}
  #auth button.go{width:100%;margin-top:26px;padding:14px;background:linear-gradient(180deg,#fff,#d4d4d4);color:#000;border:0;border-radius:10px;font-weight:900;cursor:pointer;font-size:13px;transition:all .2s;letter-spacing:2px;text-transform:uppercase}
  #auth button.go:hover{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#000;box-shadow:0 8px 24px rgba(59,130,246,.3)}
  #auth button.go:disabled{opacity:.5;cursor:wait}
  #auth .err{color:var(--red);margin-top:14px;font-size:13px;min-height:18px;font-weight:600;text-align:center}
  #auth .help{color:var(--subtle);font-size:11px;margin-top:22px;line-height:1.8;padding-top:16px;border-top:1px solid var(--line)}

  #lock{position:fixed;inset:0;background:#000;color:#fff;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:200;text-align:center;padding:24px}
  #lock.on{display:flex}

async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ $("#auth").style.display="flex"; $("#app").classList.remove("on"); return; }
  accessToken = session.access_token || "";
  const { data, error } = await sb.rpc("login_check");
  if(error){ $("#a-err").textContent = error.message; return; }
  if(!data.ok){
    if(data.error==="banned"){ $("#lock").classList.add("on"); await sb.auth.signOut().catch(()=>{}); return; }
    if(data.error==="account_limit"){
      $("#lock").classList.add("on");
      $("#lock p").textContent="同じIPで作成できる通常アカウントは3つまでです。";
      await sb.auth.signOut().catch(()=>{});
      return;
    }
    $("#a-err").textContent = data.error;
    return;
  }
  me = data.profile;
  $("#auth").style.display="none";
  $("#app").classList.add("on");
  renderMe();
  await loadIgnores();
  await loadMessages(true);
  await loadUsers();
  await loadTopic();
  await loadGame();
  subscribe();
  if(!booted){
    booted = true;
    setInterval(pruneExpiredPrivate, 60000);
    $("#chat").addEventListener("scroll", ()=>{
      const c=$("#chat");
      if(isNearBottom(80)){ hideNewBadge(); clearUnread(); scheduleReadSync(); }
    }, { passive:true });
    window.addEventListener("focus", ()=>{ scheduleReadSync(); clearUnread(); });
    window.addEventListener("pagehide", ()=>{ stopTyping(); leaveMyRoom(true); });
    $("#newbadge").onclick = ()=>{ $("#chat").scrollTop = $("#chat").scrollHeight; hideNewBadge(); clearUnread(); };
  }
  $("#inp").focus();
}

function applyTopicValue(v){

  else if(typeof v === "object"){
    txt = v.text || "";
    const exp = v.expires_at ? new Date(v.expires_at).getTime() : 0;
    if(exp && exp < Date.now()) txt = ""; // disaster topic expired
  }
  setTopic(txt);
}

function addMsg(m){
  if(m.hidden_global) return;
  if(myIgnores.has(m.user_id)) return;
  if(m.kind==="private" && m.user_id!==me.user_id && m.target_user_id!==me.user_id) return;
  const wasNearBottom = isNearBottom(80);

  const t = new Date(m.created_at).getTime();
  if(m.kind==="private" && Date.now()-t > 10*60*1000) return;

  msgIndex.set(m.id, m);

  const grouped = (m.user_id===lastSenderId) && (t-lastSenderTime < 5*60*1000) && m.kind!=="private" && !m.reply_to_id;
  lastSenderId = m.user_id; lastSenderTime = t;

  const hideTag = m.nick_hidden_snapshot || m.role_snapshot==="founder" || !m.tag_snapshot;
  const tag = hideTag ? "" : `<span class="tag">#${String(m.tag_snapshot).padStart(5,"0")}</span>`;
  const badge = m.nick_hidden_snapshot ? "" : roleBadge(m.role_snapshot);
  const prefix = m.kind==="private" ? (m.target_user_id===me.user_id?`📨 from `:`📨 to `) : "";
  const initial = esc((m.name_snapshot||"?").slice(0,1));
  const editedTag = m.edited_at ? `<span class="edited">(編集済)</span>` : "";

  // Highlight messages that reply TO me (light green)
  const repliedToMe = m.reply_to_id && (msgIndex.get(m.reply_to_id)?.user_id === me.user_id) && m.user_id !== me.user_id;

  const isOwn = m.user_id === me.user_id;
  const canDelete = isOwn || myRank() >= 2;
  const canEdit = isOwn && (m.kind==="chat" || m.kind==="private");
  let actsHtml = "";
  if(m.kind === "chat" || m.kind === "private"){
    const acts = [];
    acts.push(`<button data-act="reply">↩ 返信</button>`);
    acts.push(`<button data-act="quote">❝ 引用</button>`);
    if(canEdit) acts.push(`<button data-act="edit">✎ 編集</button>`);
    if(canDelete) acts.push(`<button data-act="delete" class="danger">🗑 削除</button>`);
    actsHtml = `<div class="mact">${acts.join("")}</div>`;
  }

  const el = document.createElement("div");
  // own messages are always rendered as "first" (no left-avatar grouping) so the right-bubble look stays consistent
  const isFirst = !grouped || isOwn;
  el.className = "msg " + (m.kind||"chat") + (isFirst?" first":"") + (repliedToMe?" is-reply-to-me":"") + (isOwn?" own":"");
  el.dataset.id = m.id;
  el.dataset.uid = m.user_id || "";
  el.dataset.kind = m.kind || "chat";
  el.dataset.ts = String(t);
  if(!isFirst){
    el.innerHTML = `<span class="ts-inline">${fmtTime(m.created_at)}</span>${actsHtml}<div class="text">${esc(stripCtl(m.content))}</div><div class="editbox"><input maxlength="300"/><button data-act="save">保存</button><button data-act="cancel">取消</button></div>`;
  } else {
    const p = profilesMap.get(m.user_id);
    const stat = (p && p.status) ? `<span class="ust-inline">— ${esc(p.status)}</span>` : "";
    const q = renderReplyQuote(m);
    el.innerHTML = `
      <div class="av">${initial}</div>
      ${actsHtml}
      ${q}
      <div class="meta">${prefix}<span class="name">${nameHtml(m.name_snapshot,m.color_snapshot)}</span>${tag} ${badge} ${stat} <span class="time">${fmtDay(m.created_at)}</span>${editedTag}</div>
      <div class="text">${esc(stripCtl(m.content))}</div>
      <div class="editbox"><input maxlength="300"/><button data-act="save">保存</button><button data-act="cancel">取消</button></div>`;
  }
  // Wire actions
  el.querySelectorAll("[data-act]").forEach(btn=>{
    btn.onclick = (ev)=>{ ev.stopPropagation(); handleMsgAction(btn.dataset.act, m, el); };
  });
  el.querySelectorAll("[data-jump]").forEach(j=>{
    j.onclick = ()=>{ const tgt=document.querySelector(`.msg[data-id="${j.dataset.jump}"]`); if(tgt){ tgt.scrollIntoView({behavior:"smooth",block:"center"}); tgt.style.outline="2px solid var(--gold)"; setTimeout(()=>tgt.style.outline="",1600);} };
  });
  $("#chat").appendChild(el);
  if(m.id > latestMsgId) latestMsgId = m.id;
  if(initialLoadingMessages) return;
  if(isOwn){ scrollToMessage(el); scheduleReadSync(); return; }
  // 新着は勝手にスクロールせず、バッジとタイトルで知らせる
  if(document.hidden || wasNearBottom || !isNearBottom(80)){
    unreadCount++;
    if(repliedToMe) unreadReplies++;
    updateTabTitle();
    if(!document.hidden) showNewBadge();
  }
  scheduleReadSync();
  scheduleReadBadgeUpdate();
}

function replaceMsg(m){
  msgIndex.set(m.id, m);
  const old = document.querySelector(`.msg[data-id="${m.id}"]`);
  if(!old) return;
  // Re-render in place: easier to remove + addMsg, but addMsg appends to end. Patch text + edited tag only.
  const txt = old.querySelector(":scope > .text");
  if(txt) txt.textContent = stripCtl(m.content||"");
  if(m.edited_at && !old.querySelector(".edited")){
    const meta = old.querySelector(".meta"); if(meta) meta.insertAdjacentHTML("beforeend", `<span class="edited">(編集済)</span>`);
  }
}

function handleMsgAction(act, m, el){
  if(act==="reply"){
    replyToMsg = { id:m.id, name:m.name_snapshot, text:stripCtl(m.content).slice(0,80) };
    $("#reply-name").textContent = m.name_snapshot;
    $("#reply-text").textContent = " " + replyToMsg.text;
    $("#reply-bar").classList.add("on");
    $("#inp").focus();
  } else if(act==="quote"){
    const snippet = stripCtl(m.content).replace(/\s+/g," ").slice(0,140);
    const prefix = `「${m.name_snapshot}: ${snippet}」 `;
    const cur = $("#inp").value;
    $("#inp").value = prefix + cur;
    $("#inp").focus();
    try{ $("#inp").setSelectionRange(prefix.length, prefix.length); }catch{}
  } else if(act==="_quote_old_"){
    $("#inp").focus();
  } else if(act==="edit"){
    el.classList.add("editing");
    const inp = el.querySelector(".editbox input");
    inp.value = stripCtl(m.content);
    inp.focus();
  } else if(act==="cancel"){
    el.classList.remove("editing");
  } else if(act==="save"){
    const inp = el.querySelector(".editbox input");
    const v = stripCtl(inp.value).trim(); if(!v) return;
    sb.rpc("edit_own_message",{ p_id: m.id, p_content: v }).then(({data,error})=>{
      if(error||!data?.ok){ flash(error?.message || data?.error || "編集失敗"); return; }
      el.classList.remove("editing");
    });
  } else if(act==="delete"){
    if(!confirm("このメッセージを削除しますか？")) return;
    sb.rpc("delete_message",{ p_id: m.id }).then(({data,error})=>{
      if(error||!data?.ok){ flash(error?.message || data?.error || "削除失敗"); return; }
    });
  }
}

function setRt(ok, label){
  $("#rtdot").classList.toggle("ng", !ok);
  $("#rttext").textContent = label || (ok?"LIVE":"OFFLINE");
}

function scheduleReconnect(reason){
  setRt(false, "接続復旧中… ("+reason+")");
  if(reconnectTimer) return;
  reconnectTimer = setTimeout(async ()=>{
    reconnectTimer=null;
    try{
      await loadMessages();
      await loadUsers();
      await loadGame();
      subscribe();
      reconnectDelay = 1000;
    }catch(e){
      reconnectDelay = Math.min(reconnectDelay*2, 15000);
      scheduleReconnect("retry");
    }
  }, reconnectDelay);
}

function subscribe(){
  if(chCh) sb.removeChannel(chCh);
  chCh = sb.channel("messages-rt")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"}, p=>{ addMsg(p.new); })
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"messages"}, p=>{ replaceMsg(p.new); })
    .on("postgres_changes",{event:"DELETE",schema:"public",table:"messages"}, p=>{
      const el=document.querySelector(`.msg[data-id="${p.old.id}"]`); if(el) el.remove();
      msgIndex.delete(p.old.id);
    })
    .subscribe(s=>{
      if(s==="SUBSCRIBED") setRt(true, "LIVE");
      else if(s==="CHANNEL_ERROR"||s==="TIMED_OUT"||s==="CLOSED") scheduleReconnect(s);
      else setRt(false, "接続中…");
    });
  if(prCh) sb.removeChannel(prCh);
  prCh = sb.channel("profiles-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"profiles"}, async ()=>{
      await loadUsers();
      const { data } = await sb.rpc("login_check");
      if(data?.ok){ me = data.profile; renderMe(); }
    }).subscribe();

  // Presence: actual realtime users
  if(presCh) sb.removeChannel(presCh);
  presCh = sb.channel("presence-rt", { config:{ presence:{ key: me.user_id }}});
  presCh.on("presence",{event:"sync"}, ()=>{
    const state = presCh.presenceState();
    presenceSet = new Set(Object.keys(state));
    scheduleRenderUsers();
  });
  presCh.subscribe(async s=>{
    if(s==="SUBSCRIBED"){
      await presCh.track({ id: me.user_id, at: Date.now() });
    } else if(s==="CHANNEL_ERROR"||s==="TIMED_OUT"||s==="CLOSED"){
      scheduleReconnect("presence "+s);
    }
  });

  // system_state realtime → topic / rollback state
  if(sysCh) sb.removeChannel(sysCh);
  sysCh = sb.channel("sys-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"system_state"}, p=>{
      if(p.new?.key==="topic"){ applyTopicValue(p.new.value); }
    }).subscribe();

  if(gameCh) sb.removeChannel(gameCh);
  gameCh = sb.channel("games-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"game_rooms"}, scheduleLoadGame)
    .on("postgres_changes",{event:"*",schema:"public",table:"game_room_members"}, scheduleLoadGame)
    .subscribe();
  if(gameMsgCh) sb.removeChannel(gameMsgCh);
  gameMsgCh = sb.channel("game-msgs-rt")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"game_room_messages"}, p=>{
      if(p.new.room_id===currentRoom) addRoomMsg(p.new);
    }).subscribe();

  setupTyping();
  setupReads();
}

setInterval(renderTypers, 1500);
function setupTyping(){
  if(tyCh) sb.removeChannel(tyCh);
  tyCh = sb.channel("typing-rt", { config:{ broadcast:{ self:false }}});
  tyCh.on("broadcast",{event:"t"}, ({payload})=>{
    if(!payload || payload.id===me.user_id) return;
    if(myIgnores.has(payload.id)) return;
    typers.set(payload.id, { name:payload.name, color:payload.color, exp:Date.now()+4000 });
    renderTypers();
  });
  tyCh.on("broadcast",{event:"st"}, ({payload})=>{
    if(!payload) return;
    typers.delete(payload.id); renderTypers();
  });
  tyCh.subscribe();
}
function sendTyping(text){
  if(!tyCh||!me) return;
  if(text===lastTypingText) { armTypingIdle(); return; }
  lastTypingText = text;
  const now=Date.now();
  if(typingActive && now-lastTypingSent < 2000){ armTypingIdle(); return; }
  lastTypingSent=now; typingActive=true;
  tyCh.send({ type:"broadcast", event:"t", payload:{ id:me.user_id, name:me.name, color:me.name_color }});
  armTypingIdle();
}
function armTypingIdle(){
  if(typingIdleTimer) clearTimeout(typingIdleTimer);
  typingIdleTimer = setTimeout(stopTyping, 2200);
}
function stopTyping(){
  if(typingIdleTimer){ clearTimeout(typingIdleTimer); typingIdleTimer=null; }
  if(!tyCh||!me||!typingActive) return;
  typingActive=false; lastTypingSent=0; lastTypingText="";
  tyCh.send({ type:"broadcast", event:"st", payload:{ id:me.user_id }});
}

// ===== READ RECEIPTS (既読) — broadcast based, no DB =====
let rdCh=null, myLastRead=0, lastReadSent=0, readSyncTimer=null;
const reads = new Map(); // user_id -> last_read_msg_id
function setupReads(){
  if(rdCh) sb.removeChannel(rdCh);
  rdCh = sb.channel("reads-rt", { config:{ broadcast:{ self:false }}});
  rdCh.on("broadcast",{event:"r"}, ({payload})=>{
    if(!payload || payload.id===me.user_id) return;
    if(myIgnores.has(payload.id)) return;
    const prev = reads.get(payload.id)||0;
    if(payload.n > prev){ reads.set(payload.id, payload.n); scheduleReadBadgeUpdate(); }
  });
  rdCh.on("broadcast",{event:"hi"}, ()=>{ // newcomer: rebroadcast current
    if(myLastRead) sendRead(true);
  });
  rdCh.subscribe(s=>{
    if(s==="SUBSCRIBED"){
      rdCh.send({type:"broadcast",event:"hi",payload:{id:me.user_id}});
      if(myLastRead) sendRead(true);
    }
  });
}
function scheduleReadSync(){
  if(document.hidden) return;
  if(readSyncTimer) return;
  readSyncTimer = setTimeout(()=>{
    readSyncTimer=null;
    if(Date.now() < ignoreScrollUntil) return;
    const c=$("#chat");
    const atBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 120;
    if(atBottom && latestMsgId>myLastRead){
      myLastRead = latestMsgId;
      sendRead(false);
      scheduleReadBadgeUpdate();
    }
  }, 400);
}
function scheduleReadBadgeUpdate(){
  if(readBadgeTimer) return;
  readBadgeTimer = setTimeout(()=>{ readBadgeTimer=null; updateReadBadges(); }, 250);
}
function sendRead(force){
  if(!rdCh||!me||!myLastRead) return;
  const now=Date.now();
  if(!force && now-lastReadSent < 1200) return;
  lastReadSent=now;
  rdCh.send({type:"broadcast",event:"r",payload:{id:me.user_id, n:myLastRead}});
}
function updateReadBadges(){
  if(!me) return;
  // remove existing badges
  document.querySelectorAll("#chat .reads").forEach(el=>el.remove());
  // find last own non-private msg
  const own = [...document.querySelectorAll(`#chat .msg[data-uid="${me.user_id}"]`)]
    .filter(el=>el.dataset.kind!=="private");
  if(!own.length) return;
  const last = own[own.length-1];
  const lastId = Number(last.dataset.id||0);
  if(!lastId) return;
  let n=0;
  for(const [uid,rid] of reads){ if(uid!==me.user_id && rid>=lastId) n++; }
  if(n<=0) return;
  const tag = document.createElement("div");
  tag.className="reads";
  tag.textContent = `既読 ${n}`;
  last.after(tag);
}
document.addEventListener("visibilitychange", ()=>{
  if(!document.hidden) scheduleReadSync();
});

// 3-min health check
setInterval(async ()=>{
  if(healthBusy || !me) return;
  healthBusy = true;
  const t0=Date.now(); const ch=sb.channel("ping-"+t0); let got=false;
  ch.on("broadcast",{event:"p"},()=>{ got=true; });
  await ch.subscribe(async s=>{
    if(s==="SUBSCRIBED"){
      await ch.send({type:"broadcast",event:"p",payload:{}});
      setTimeout(async ()=>{
        if(got) setRt(true, "LIVE "+new Date().toLocaleTimeString("ja-JP"));
        else {
          setRt(false,"接続断");
          scheduleReconnect("connection-lost");
        }
        healthBusy = false;
        sb.removeChannel(ch);
      }, 1500);
    }
  });
}, 180000);

// Game rooms
const gameLabel = g => ({oldmaid:"ババ抜き",werewolf:"人狼",othello:"オセロ"}[g]||"未選択");
async function loadGame(){
  const { data, error } = await sb.rpc("get_game_snapshot");
  if(error || !data?.ok){ $("#gstatus").textContent="未接続"; return; }
  gameSnapshot = data; currentRoom = data.myRoom || currentRoom || 1;
  renderRooms(); await loadRoomMessages();
}
function scheduleLoadGame(){
  if(gameLoadTimer) return;
  gameLoadTimer = setTimeout(()=>{ gameLoadTimer=null; loadGame(); }, 250);
}
function renderRooms(){
  const wrap=$("#rooms"); if(!gameSnapshot){ wrap.innerHTML=""; return; }
  $("#gstatus").textContent = gameSnapshot.myRoom ? `ROOM ${gameSnapshot.myRoom}に参加中` : "未入室";
  wrap.innerHTML = gameSnapshot.rooms.map(r=>{
    const isHost = r.host_user_id===me.user_id, mine = r.room_id===currentRoom, playing = r.status==="playing";
    const pls = (r.players||[]);
    const players = pls.length
      ? pls.map(p=>`<span class="pill${p.user_id===me.user_id?' me':''}${p.role==='spectator'?' sp':''}">${nameHtml(p.name,p.color)}${p.role==='spectator'?' 観戦':''}</span>`).join("")
      : `<span class="pill empty">まだ誰もいません</span>`;
    const choose = isHost && !playing ? `<div><div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-weight:800">ゲームを選択</div><div class="gamepick"><button class="mini-btn${r.game_type==='oldmaid'?' primary':''}" data-game="oldmaid" data-room="${r.room_id}">🃏 ババ抜き</button><button class="mini-btn${r.game_type==='werewolf'?' primary':''}" data-game="werewolf" data-room="${r.room_id}">🐺 人狼</button><button class="mini-btn${r.game_type==='othello'?' primary':''}" data-game="othello" data-room="${r.room_id}">⚫ オセロ</button></div></div>` : "";
    const state = renderGameState(r);
    const inRoom = pls.some(p=>p.user_id===me.user_id);
    const actions = `<div class="game-actions${isHost?' three':''}">
      <button class="mini-btn primary" data-join="${r.room_id}">${inRoom?'切替: プレイ':'プレイで入る'}</button>
      <button class="mini-btn ghost" data-watch="${r.room_id}">${inRoom?'切替: 観戦':'観戦で入る'}</button>
      ${isHost?`<button class="mini-btn primary" data-start="${r.room_id}" ${playing?'disabled':''}>▶ 開始</button>`:''}
    </div>${inRoom?`<button class="mini-btn danger" data-giveup="${r.room_id}" style="margin-top:4px">ギブアップ / 退室</button>`:''}`;
    const status = playing?'<span class="stat live">● PLAYING</span>':(r.game_type?'<span class="stat lobby">○ LOBBY</span>':'<span class="stat">○ EMPTY</span>');
    return `<section class="room${mine?' on':''}">
      <div class="room-h">
        <div class="room-num">${r.room_id}</div>
        <div class="room-title"><span class="gname">${gameLabel(r.game_type)}</span><span class="gsub">Room ${r.room_id}</span></div>
        <div class="room-meta"><span class="badge-cnt"><b>${r.count}</b>人 / プレイ <b>${r.playerCount}</b></span>${status}</div>
      </div>
      <div class="room-body">
        <div class="players">${players}</div>
        ${choose}
        ${actions}
        ${state}
      </div>
    </section>`;
  }).join("");
  wrap.querySelectorAll("[data-join]").forEach(b=>b.onclick=()=>joinRoom(+b.dataset.join,true));
  wrap.querySelectorAll("[data-watch]").forEach(b=>b.onclick=()=>joinRoom(+b.dataset.watch,false));
  wrap.querySelectorAll("[data-start]").forEach(b=>b.onclick=()=>rpcGame("start_game_room",{p_room_id:+b.dataset.start}));
  wrap.querySelectorAll("[data-giveup]").forEach(b=>b.onclick=()=>rpcGame("leave_game_room",{p_room_id:+b.dataset.giveup}));
  wrap.querySelectorAll("[data-game]").forEach(b=>b.onclick=()=>rpcGame("choose_game",{p_room_id:+b.dataset.room,p_game:b.dataset.game}));
  wrap.querySelectorAll(".cell[data-r]").forEach(c=>c.onclick=()=>gameAct(currentRoom,"move",{r:+c.dataset.r,c:+c.dataset.c}));
  wrap.querySelectorAll("[data-draw]").forEach(b=>b.onclick=()=>gameAct(+b.dataset.draw,"draw",{}));
  wrap.querySelectorAll("[data-vote]").forEach(b=>b.onclick=()=>gameAct(currentRoom,"vote",{target:b.dataset.vote}));
}
function renderGameState(r){
  if(r.room_id!==currentRoom) return `<div class="game-state">入室するとチャット・観戦・プレイできます。</div>`;
  const st=r.public_state||{};
  if(r.status!=="playing") return `<div class="game-state">${gameLabel(r.game_type)}を選んで開始できます。</div>`;
  if(r.game_type==="othello"){
    const board=(st.board||[]).map((row,ri)=>row.map((v,ci)=>`<button class="cell" data-r="${ri}" data-c="${ci}">${v?`<i class="disc ${v}"></i>`:""}</button>`).join("")).join("");
    return `<div class="game-state">${st.color==='B'?'黒':'白'}の番<div class="board">${board}</div></div>`;
  }
  if(r.game_type==="oldmaid") return `<div class="game-state">手札: ${(gameSnapshot.myHand||[]).length}枚 / ${r.turn_user_id===me.user_id?'あなたの番':'待機中'}<div class="hand">${(gameSnapshot.myHand||[]).map(c=>`<span class="card">${esc(c)}</span>`).join("")}</div><div class="game-actions"><button class="mini-btn" data-draw="${r.room_id}">1枚引く</button></div></div>`;
  const alive=new Set(st.alive||[]), targets=(r.players||[]).filter(p=>alive.has(p.user_id)).map(p=>`<button class="mini-btn" data-vote="${p.user_id}">${esc(p.name)}</button>`).join("");
  return `<div class="game-state">${st.phase==='night'?'夜':'昼'} / あなた: ${gameSnapshot.myWerewolfRole==='werewolf'?'人狼':'村人'}<div class="game-actions">${targets}</div></div>`;
}
async function rpcGame(fn,args){ const {data,error}=await sb.rpc(fn,args); if(error||!data?.ok) flash(error?.message||data?.error||"失敗"); await loadGame(); }
async function joinRoom(id,play){ currentRoom=id; await rpcGame("join_game_room",{p_room_id:id,p_play:play}); }
async function gameAct(id,action,payload){ await rpcGame("game_action",{p_room_id:id,p_action:action,p_payload:payload}); }
async function leaveMyRoom(keepalive=false){
  const room = gameSnapshot?.myRoom || currentRoom;
  if(!room || !accessToken) return;
  if(keepalive && navigator.sendBeacon){
    const body = new Blob([JSON.stringify({ room_id: room, access_token: accessToken })], { type:"application/json" });
    navigator.sendBeacon("/api/public/leave-game-room", body);
    return;
  }
  await sb.rpc("leave_game_room", { p_room_id: room });
}
async function loadRoomMessages(){ const {data}=await sb.from("game_room_messages").select("*").eq("room_id",currentRoom).order("id",{ascending:true}).limit(80); $("#roommsgs").innerHTML=""; $("#gv-rmsgs").innerHTML=""; (data||[]).forEach(addRoomMsg); }
function addRoomMsg(m){ const box=$("#roommsgs"); const d=document.createElement("div"); d.className="rmsg"; d.innerHTML=`<span class="rn">${nameHtml(m.name_snapshot,m.color_snapshot)}</span> ${esc(stripCtl(m.content))}`; box.appendChild(d); box.scrollTop=box.scrollHeight; }

// Command palette
function renderPalCmds(prefix){
  const items = allowedCmds().filter(x=>x.c.startsWith(prefix));
  if(!items.length){ $("#pal").classList.remove("on"); return; }
  $("#pal").innerHTML = `<div class="ph">あなたが使えるコマンド  /${esc(prefix)}</div>` +
    items.map((x,i)=>`<div class="it${i===0?" sel":""}" data-c="${esc(x.c)}"><div><span class="cmd">/${esc(x.c)}</span><span class="arg">${esc(x.a)}</span></div><span class="desc">${esc(x.d)}${x.h?`<br>${esc(x.h)}`:""}</span></div>`).join("");
  $("#pal").classList.add("on");
  $("#pal").querySelectorAll(".it").forEach(el=>{
    el.onclick = ()=>{ $("#inp").value = "/"+el.dataset.c+" "; $("#pal").classList.remove("on"); $("#inp").focus(); };
  });
}
function renderPalNames(cmd, prefix){
  const pre = (prefix||"").toLowerCase();
  const list = [...presenceSet]
    .map(id=>profilesMap.get(id))
    .filter(u=>u && u.user_id!==me.user_id && u.name.toLowerCase().startsWith(pre))
    .slice(0,8);
  if(!list.length){ $("#pal").classList.remove("on"); return; }
  $("#pal").innerHTML = `<div class="ph">/${esc(cmd)} の対象（オンライン）</div>` +
    list.map((u,i)=>`<div class="it${i===0?" sel":""}" data-n="${esc(u.name)}"><div><span class="cmd">${nameHtml(u.name,u.name_color)}</span>${u.status?`<span class="arg">— ${esc(u.status)}</span>`:""}</div><span class="desc">${esc(u.role||"user")}</span></div>`).join("");
  $("#pal").classList.add("on");
  $("#pal").querySelectorAll(".it").forEach(el=>{
    el.onclick = ()=>{
      const v = $("#inp").value;
      // replace the trailing token after the command with the chosen name + space
      const m = v.match(/^(\/\S+\s+).*?$/);
      $("#inp").value = (m?m[1]:("/"+cmd+" ")) + el.dataset.n + " ";
      $("#pal").classList.remove("on"); $("#inp").focus();
    };
  });
}
function updatePal(v){
  if(!v.startsWith("/")){ $("#pal").classList.remove("on"); return; }
  const sp = v.indexOf(" ");
  if(sp<0){ renderPalCmds(v.slice(1).toLowerCase()); return; }
  const cmd = v.slice(1, sp).toLowerCase();
  if(cmd==="color"){
    $("#pal").innerHTML = `<div class="ph">/color 色を選択</div><div class="hint">カラーコード不要。色を押すだけで入力できます。</div><div class="swatches">${COLOR_PRESETS.map(c=>`<button class="sw" data-color="${c}" style="background:${c}"></button>`).join("")}</div>`;
    $("#pal").classList.add("on");
    $("#pal").querySelectorAll(".sw").forEach(b=>b.onclick=()=>{ $("#inp").value="/color "+b.dataset.color; $("#pal").classList.remove("on"); $("#inp").focus(); });
    return;
  }
  const found = COMMANDS.find(x=>x.c===cmd);
  if(found && !NAME_TARGET_CMDS.has(cmd)){
    $("#pal").innerHTML = `<div class="ph">/${esc(cmd)} の入力</div><div class="hint"><code>${esc(found.h||('/'+cmd+' '+found.a))}</code><span>${esc(found.d)}</span></div>`;
    $("#pal").classList.add("on"); return;
  }
  if(!NAME_TARGET_CMDS.has(cmd)){ $("#pal").classList.remove("on"); return; }
  // only suggest while editing the first arg (name); stop after the name is followed by a space
  const rest = v.slice(sp+1);
  const sp2 = rest.indexOf(" ");
  if(sp2 >= 0){ $("#pal").classList.remove("on"); return; }
  renderPalNames(cmd, rest);
}
$("#inp").addEventListener("input", e=>{
  const v = e.target.value;
  updatePal(v);
  const trimmed = v.trim();
  if(trimmed && !v.startsWith("/")) sendTyping(trimmed);
  else stopTyping();
});
$("#inp").addEventListener("blur", stopTyping);
$("#inp").addEventListener("keydown", e=>{
  if(e.key==="Escape"){ $("#pal").classList.remove("on"); }
});

function flash(msg, kind){ const t=$("#typing"); t.innerHTML = `<span class="${kind||"err"}">${esc(msg)}</span>`; setTimeout(()=>{ t.innerHTML=""; }, 4000); }

document.getElementById("send").onclick = submit;
$("#inp").addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); submit(); }});

async function submit(){
  if(sending) return;
  let v = stripCtl($("#inp").value).trim();
  if(!v) return;
  if(v.length > 300){ flash("300字以上は送信不可"); return; }
  $("#inp").value=""; $("#pal").classList.remove("on"); stopTyping();
  sending = true;

  try{ if(v.startsWith("/")){
    const sp = v.indexOf(" ");
    const cmd = (sp<0?v.slice(1):v.slice(1,sp)).toLowerCase();
    const args = sp<0?"":v.slice(sp+1);
    if(cmd==="help"){ openHelp(); return; }
    if(cmd==="admin"){ showAdminPanel(); return; }
    if(cmd==="ng-list"){ await showListPanel("ng"); return; }
    if(cmd==="list"){
      if(myRank()<2){ flash("deleter以上のみ"); return; }
      await showListPanel("status"); return;
    }
    if(cmd==="log"){
      if(myRank()<2){ flash("deleter以上のみ"); return; }
      await showListPanel("log"); return;
    }
    if(cmd==="color" && args && args!=="rainbow" && !HEX_RE.test(args.trim())){
      flash("色は #RRGGBB か rainbow"); return;
    }
    const { data, error } = await sb.rpc("run_command_logged", { p_cmd: cmd, p_args: args });
    if(error){ flash(error.message); return; }
    if(!data.ok) flash(data.error);
    else if(data.result) flash("🎴 "+data.result, "ok");
    if(cmd==="ignore"||cmd==="unignore") await loadIgnores();
    if(cmd==="color"||cmd==="nick"||cmd==="status"){
      const { data:d2 } = await sb.rpc("login_check"); if(d2?.ok){ me=d2.profile; renderMe(); }
      await loadUsers();
    }
  } else {
    const replyId = replyToMsg ? replyToMsg.id : null;
    const { data, error } = await sb.rpc("send_message", { p_content: v, p_reply_to: replyId });
    if(error){ flash(error.message); return; }
    if(!data.ok){
      const map = {muted:"ミュート中です",banned:"BANされています",too_long:"300字以上は送信できません",too_fast:"メッセージを送る感覚が早すぎます！",duplicate:"直前と同じ内容は送れません",zalgo:"zalgo文字は禁止",forbidden_link:"html.cafe リンクは禁止",empty:"空メッセージ",not_logged_in:"ログインしていません",ng_word:`🚫 NGワード「${data.word||""}」のため1分IPミュート`};
      flash(map[data.error]||data.error);
    } else { clearReply(); }
  }} finally { sending = false; }
}
function clearReply(){ replyToMsg=null; $("#reply-bar").classList.remove("on"); }
$("#reply-cancel").onclick = clearReply;

async function showListPanel(kind){
  const body = $("#lp-body"); const title = $("#lp-title");
  body.innerHTML = `<div class="lp-empty">読み込み中…</div>`;
  $("#listpanel").classList.add("on");
  if(kind==="ng"){
    title.textContent = "NGワード一覧";
    const { data } = await sb.rpc("list_ng_words");
    const arr = data || [];
    body.innerHTML = arr.length === 0
      ? `<div class="lp-empty">登録なし</div>`
      : `<table><thead><tr><th>ワード</th><th>追加</th></tr></thead><tbody>${arr.map(w=>`<tr><td><code>${esc(w.word)}</code></td><td>${esc(new Date(w.created_at).toLocaleString("ja-JP"))}</td></tr>`).join("")}</tbody></table>`;
  } else if(kind==="status"){
    title.textContent = "現在のミュート / BAN 一覧";
    const { data, error } = await sb.rpc("list_status");
    if(error || data?.error){ body.innerHTML = `<div class="lp-empty">${esc(error?.message||data?.error||"取得失敗")}</div>`; return; }
    const renderTbl = (rows, cols) => rows.length === 0
      ? `<div class="lp-empty">なし</div>`
      : `<table><thead><tr>${cols.map(c=>`<th>${esc(c.h)}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${c.f(r)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
    body.innerHTML = `
      <div class="lp-sect"><h3>🔇 ミュート (${data.mutes.length})</h3>${renderTbl(data.mutes, [
        {h:"名前",f:r=>esc(r.name||"(不明)")},
        {h:"権限",f:r=>esc(r.role||"-")},
        {h:"種別",f:r=>r.ip_based?'<span class="pill-ng">IP</span>':"通常"},
        {h:"解除予定",f:r=>esc(new Date(r.until).toLocaleString("ja-JP"))},
      ])}</div>
      <div class="lp-sect"><h3>🚫 BAN (${data.bans.length})</h3>${renderTbl(data.bans, [
        {h:"名前",f:r=>esc(r.name||"(IP only)")},
        {h:"理由",f:r=>esc(r.reason||"-")},
        {h:"IP",f:r=>esc(r.ip||"-")},
        {h:"日時",f:r=>esc(new Date(r.created_at).toLocaleString("ja-JP"))},
      ])}</div>
      <div class="lp-sect"><h3>🎮 部屋BAN (${data.room_bans.length})</h3>${renderTbl(data.room_bans, [
        {h:"部屋",f:r=>"#"+r.room_id},
        {h:"名前",f:r=>esc(r.name||"-")},
        {h:"解除予定",f:r=>esc(new Date(r.until).toLocaleString("ja-JP"))},
      ])}</div>`;
  } else if(kind==="log"){
    title.textContent = "コマンド実行履歴 (直近3日)";
    const { data, error } = await sb.rpc("list_command_log", { p_limit: 200 });
    if(error || data?.error){ body.innerHTML = `<div class="lp-empty">${esc(error?.message||data?.error||"取得失敗")}</div>`; return; }
    const arr = data || [];
    body.innerHTML = arr.length === 0
      ? `<div class="lp-empty">履歴なし</div>`
      : `<table><thead><tr><th>日時</th><th>名前</th><th>権限</th><th>コマンド</th><th>引数</th><th>結果</th></tr></thead><tbody>${
        arr.map(r=>`<tr><td>${esc(new Date(r.at).toLocaleString("ja-JP"))}</td><td>${esc(r.name)}</td><td>${esc(r.role)}</td><td><code>/${esc(r.cmd)}</code></td><td>${esc((r.args||"").slice(0,40))}</td><td class="${r.ok?'pill-ok':'pill-ng'}">${r.ok?"OK":"NG"}</td></tr>`).join("")
      }</tbody></table>`;
  }
}
$("#lp-close").onclick = ()=>$("#listpanel").classList.remove("on");
$("#listpanel").onclick = e=>{ if(e.target.id==="listpanel") $("#listpanel").classList.remove("on"); };

function showAdminPanel(){
  $("#lp-title").textContent = "権限を持つメンバー";
  const all = [...profilesMap.values()];
  const groups = [
    {key:"founder",  label:"👑 創設者", rows: all.filter(u=>u.role==="founder")},
    {key:"admin",    label:"🛡 管理者",  rows: all.filter(u=>u.role==="admin")},
    {key:"deleter",  label:"🧹 DELETER", rows: all.filter(u=>u.role==="deleter")},
  ];
  const renderRows = (rows) => rows.length===0
    ? `<div class="lp-empty">なし</div>`
    : `<table><thead><tr><th>名前</th><th>状態</th><th>オンライン</th></tr></thead><tbody>${rows.map(u=>`<tr><td>${nameHtml(u.name,u.name_color)} ${u.nick_hidden?'<span class="tag">(匿名)</span>':''}</td><td>${esc(u.status||"-")}</td><td class="${presenceSet.has(u.user_id)?'pill-ok':'pill-ng'}">${presenceSet.has(u.user_id)?"● ONLINE":"○ offline"}</td></tr>`).join("")}</tbody></table>`;
  $("#lp-body").innerHTML = groups.map(g=>`<div class="lp-sect"><h3>${g.label} (${g.rows.length})</h3>${renderRows(g.rows)}</div>`).join("");
  $("#listpanel").classList.add("on");
}


// ============ view tabs (main / game) ============
let currentView = "main";
function setView(v){
  currentView = v;
  $("#tab-main").classList.toggle("on", v==="main");
  $("#tab-game").classList.toggle("on", v==="game");
  $("#chatpane").classList.toggle("hidden-main", v==="game");
}
$("#tab-main").onclick = ()=>setView("main");
$("#tab-game").onclick = ()=>setView("game");

// ============ game view rendering ============
function renderGameView(){
  const board = $("#gv-board");
  const r = gameSnapshot?.rooms?.find(x=>x.room_id===currentRoom);
  $("#gv-rtitle").textContent = `部屋#${currentRoom} ROOM CHAT`;
  const gv = $("#gameview");
  if(!r){ board.innerHTML = `<div class="gv-empty">部屋に入ってゲームを始めましょう →</div>`; gv.classList.remove("playing"); return; }
  const gname = ({oldmaid:"🃏 ババ抜き",werewolf:"🐺 人狼",othello:"⚫ オセロ"})[r.game_type] || "未選択";
  const tabState = $("#gtab-state");
  if(r.status==="playing"){ tabState.style.display=""; tabState.textContent="LIVE"; gv.classList.add("playing"); }
  else { tabState.style.display="none"; gv.classList.remove("playing"); }
  const meRow = (gameSnapshot.members||[]).find(m=>m.user_id===me.user_id && m.room_id===currentRoom);
  const isPlayer = meRow?.role === "player";
  const head = `<h2>${gname} — 部屋#${r.room_id}</h2><div class="gv-sub">状態: ${r.status==="playing"?"プレイ中":r.status==="lobby"?"ロビー":"終了"} / あなた: ${meRow?(isPlayer?"プレイヤー":"観戦"):"未参加"}</div>`;
  let body = "";
  if(r.status!=="playing"){
    body = `<div class="gv-empty">${r.game_type?"開始待ち…":"ホストがゲームを選択してください"}</div>`;
    if(meRow && r.host_user_id===me.user_id && r.game_type){
      body += `<div class="gv-actions"><button class="mini-btn primary" onclick="startCurGame()">▶ 開始</button></div>`;
    }
  } else if(r.game_type==="othello"){
    const st = r.public_state||{};
    const board8 = (st.board||[]).map((row,ri)=>row.map((v,ci)=>`<button class="cell" data-r="${ri}" data-c="${ci}">${v?`<i class="disc ${v}"></i>`:""}</button>`).join("")).join("");
    body = `<div class="board-big">${board8}</div><div class="gv-sub" style="text-align:center;margin-top:14px">${st.color==='B'?'⚫ 黒':'⚪ 白'} の番 / 自分: ${st.black===me.user_id?'⚫黒':st.white===me.user_id?'⚪白':'観戦'}</div><div class="gv-actions">${isPlayer?'<button class="mini-btn danger" onclick="giveupCur()">🏳 ギブアップ</button>':""}</div>`;
  } else if(r.game_type==="oldmaid"){
    const hand = gameSnapshot.myHand||[];
    body = `<div class="hand-big">${hand.length?hand.map(c=>`<div class="card">${esc(c)}</div>`).join(""):'<div class="gv-empty">手札なし</div>'}</div><div class="gv-sub" style="text-align:center;margin-top:14px">${r.turn_user_id===me.user_id?'🎯 あなたの番':'待機中…'}</div><div class="gv-actions">${isPlayer && r.turn_user_id===me.user_id ? `<button class="mini-btn primary" onclick="actionCur('draw')">🃏 1枚引く</button>`:""}${isPlayer?'<button class="mini-btn danger" onclick="giveupCur()">🏳 ギブアップ</button>':""}</div>`;
  } else if(r.game_type==="werewolf"){
    const st = r.public_state||{};
    const role = gameSnapshot.myWerewolfRole;
    const alive = st.alive||[];
    const isAlive = alive.includes(me.user_id);
    body = `<div class="ww-roles"><div class="ww-role">${st.phase==='night'?'🌙 夜':'☀ 昼'} / Day ${st.day||1}</div>${role?`<div class="ww-role">あなた: ${role==='werewolf'?'🐺 人狼':'👤 村人'} ${isAlive?'':'💀'}</div>`:''}<div class="gv-sub">${esc(st.note||'')}</div></div>`;
    if(isPlayer && isAlive){
      const canVote = st.phase==='night' ? role==='werewolf' : true;
      const targets = alive.filter(u=>u!==me.user_id);
      body += `<div class="gv-actions">${canVote?targets.map(uid=>{const p=profilesMap.get(uid);return `<button class="mini-btn" onclick="actionCur('vote',{target:'${uid}'})">${esc(p?.name||uid.slice(0,6))} に投票</button>`;}).join(""):'<div class="gv-empty">あなたの操作待ちなし</div>'}<button class="mini-btn danger" onclick="giveupCur()">🏳 ギブアップ</button></div>`;
    }
  }
  board.innerHTML = head + body;
  // Wire othello cell clicks
  board.querySelectorAll(".board-big .cell").forEach(c=>{
    c.onclick = ()=>actionCur("move",{r:+c.dataset.r,c:+c.dataset.c});
  });
}
window.actionCur = async (act, payload={})=>{ const {data,error}=await sb.rpc("game_action",{p_room_id:currentRoom,p_action:act,p_payload:payload}); if(error||!data?.ok) flash(error?.message||data?.error||"失敗"); };
window.giveupCur = async ()=>{ if(!confirm("ギブアップしますか？")) return; await window.actionCur("giveup"); };
window.startCurGame = async ()=>{ const {data,error}=await sb.rpc("start_game_room",{p_room_id:currentRoom}); if(error||!data?.ok) flash(error?.message||data?.error||"開始失敗"); };

// Hook game view render whenever game data refreshes
const _origLoadGame = window._origLoadGame || null;
// We'll patch loadGame after definition — see below patch

// ============ game room chat (in game view) ============
function addGvRoomMsg(m){ const box=$("#gv-rmsgs"); const d=document.createElement("div"); d.className="rmsg"; d.innerHTML=`<span class="rn">${nameHtml(m.name_snapshot,m.color_snapshot)}</span> ${esc(stripCtl(m.content))}`; box.appendChild(d); box.scrollTop=box.scrollHeight; }
async function gvSendRoom(){
  const v=stripCtl($("#gv-rinp").value).trim(); if(!v) return;
  $("#gv-rinp").value="";
  const {data,error}=await sb.rpc("send_game_chat",{p_room_id:currentRoom,p_content:v});
  if(error||!data?.ok) flash(error?.message||data?.error||"部屋チャット送信失敗");
}
$("#gv-rsend").onclick = gvSendRoom;
$("#gv-rinp").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); gvSendRoom(); }});

async function sendRoomChat(){
  const v=stripCtl($("#rinp").value).trim(); if(!v) return;
  $("#rinp").value="";
  const {data,error}=await sb.rpc("send_game_chat",{p_room_id:currentRoom,p_content:v});
  if(error||!data?.ok) flash(error?.message||data?.error||"部屋チャット送信失敗");
}
$("#rsend").onclick=sendRoomChat;
$("#rinp").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); sendRoomChat(); }});

$("#togUsers").onclick = ()=>{ const p=$("#userpane"); p.style.display = p.style.display==="none"?"":"none"; };
$("#logoutBig").onclick = doLogout;

// Help modal
function openHelp(){
  const list = $("#hm-list");
  const cmds = allowedCmds();
  list.innerHTML = `<div style="padding:10px 22px;color:var(--muted);font-size:11px;letter-spacing:1.5px">あなた (${esc(me?.role||'user')}) が使えるコマンド: ${cmds.length}個</div>` +
    cmds.map(x=>`
    <div class="hm-row" data-c="${esc(x.c)}">
      <div><div class="hm-cmd">/${esc(x.c)}</div>${x.a?`<span class="hm-arg">${esc(x.a)}</span>`:""}</div>
      <div class="hm-desc">${esc(x.d)}</div>
    </div>`).join("");
  list.querySelectorAll(".hm-row").forEach(el=>{
    el.onclick = ()=>{ $("#inp").value = "/"+el.dataset.c+(el.dataset.c==="help"?"":" "); $("#helpModal").classList.remove("on"); $("#inp").focus(); };
  });
  $("#helpModal").classList.add("on");
}
$("#togHelp").onclick = openHelp;
$("#hm-close").onclick = ()=>$("#helpModal").classList.remove("on");
$("#helpModal").onclick = e=>{ if(e.target.id==="helpModal") $("#helpModal").classList.remove("on"); };
document.addEventListener("keydown", e=>{ if(e.key==="Escape"){ $("#helpModal").classList.remove("on"); $("#listpanel").classList.remove("on"); }});

// Patch loadGame so it also re-renders the big game view + auto-loads room messages into gv
const _loadGameOrig = loadGame;
loadGame = async function(){
  await _loadGameOrig();
  renderGameView();
};
// Also mirror INSERTs from realtime
const _addRoomOrig = addRoomMsg;
addRoomMsg = function(m){ _addRoomOrig(m); addGvRoomMsg(m); };

sb.auth.onAuthStateChange((e, session)=>{
  accessToken = session?.access_token || accessToken;
  if(e==="SIGNED_OUT" && me){ doLogout(); }
});

boot();
</script>
